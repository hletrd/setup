[features]
child_agents_md = true
multi_agent = true

# ============================================================
# oh-my-codex (OMX) Configuration
# Managed by omx setup - manual edits preserved on next setup
# ============================================================

# OMX State Management MCP Server
[mcp_servers.omx_state]
command = "node"
args = ["__HOME__/.local/share/fnm/node-versions/v24.14.0/installation/lib/node_modules/oh-my-codex/dist/mcp/state-server.js"]
enabled = true
startup_timeout_sec = 5

# OMX Project Memory MCP Server
[mcp_servers.omx_memory]
command = "node"
args = ["__HOME__/.local/share/fnm/node-versions/v24.14.0/installation/lib/node_modules/oh-my-codex/dist/mcp/memory-server.js"]
enabled = true
startup_timeout_sec = 5

# OMX Code Intelligence MCP Server (LSP diagnostics, AST search)
[mcp_servers.omx_code_intel]
command = "node"
args = ["__HOME__/.local/share/fnm/node-versions/v24.14.0/installation/lib/node_modules/oh-my-codex/dist/mcp/code-intel-server.js"]
enabled = true
startup_timeout_sec = 10

# OMX Trace MCP Server (agent flow timeline & statistics)
[mcp_servers.omx_trace]
command = "node"
args = ["__HOME__/.local/share/fnm/node-versions/v24.14.0/installation/lib/node_modules/oh-my-codex/dist/mcp/trace-server.js"]
enabled = true
startup_timeout_sec = 5

# OMX Team MCP Server (team job lifecycle: start, status, wait, cleanup)
[mcp_servers.omx_team_run]
command = "node"
args = ["__HOME__/.local/share/fnm/node-versions/v24.14.0/installation/lib/node_modules/oh-my-codex/dist/mcp/team-server.js"]
enabled = true
startup_timeout_sec = 5

