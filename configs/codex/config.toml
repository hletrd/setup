[profiles.debugger]
model = "gpt-5.4"
model_reasoning_effort = "xhigh"

[profiles.refactorer]
model = "gpt-5.4"
model_reasoning_effort = "xhigh"

[profiles.tdd]
model = "gpt-5.4"
model_reasoning_effort = "xhigh"

[profiles.docs-writer]
