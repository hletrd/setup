# oh-my-codex top-level settings (must be before any [table])
notify = ["node", "__HOME__/.local/share/fnm/node-versions/v24.14.0/installation/lib/node_modules/oh-my-codex/scripts/notify-hook.js"]
model_reasoning_effort = "high"
developer_instructions = "You have oh-my-codex installed. AGENTS.md is your orchestration brain and the main orchestration surface. Use /prompts:<role> and spawned role prompts for specialized subagent work. Use workflow skills via $name when explicitly invoked or clearly routed by AGENTS.md. Treat role prompts as narrower execution surfaces under AGENTS.md authority."


plan_mode_reasoning_effort = "xhigh"

model_context_window = 1000000
model_auto_compact_token_limit = 900000


model = "gpt-5.4"
service_tier = "fast"
[projects."__HOME__"]
trust_level = "trusted"

[projects."__HOME__/git/Xylolabs-Knowledge-Engine"]
trust_level = "trusted"

[projects."__HOME__/git/RB-Y1"]
trust_level = "trusted"

[projects."__HOME__/git/xylolabs-panel-demo"]
trust_level = "trusted"

[projects."__HOME__/git/burstpick"]
trust_level = "trusted"

[projects."__HOME__/flash-shared/xylolabs-api"]
trust_level = "trusted"

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp@latest"]
startup_timeout_sec = 20
tool_timeout_sec = 120
env_vars = ["CONTEXT7_API_KEY"]

# ── Agent Profiles ──────────────────────────────────────────────

[profiles.architect]
model = "gpt-5.4"
model_reasoning_effort = "xhigh"

[profiles.code-reviewer]
model = "gpt-5.4"
model_reasoning_effort = "xhigh"

[profiles.security-reviewer]
