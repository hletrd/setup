[profiles.pro-photographer-reviewer]
model = "gpt-5.4"
model_reasoning_effort = "xhigh"

[profiles.product-marketer-reviewer]
model = "gpt-5.4"
model_reasoning_effort = "xhigh"

[profiles.ui-ux-designer-reviewer]
