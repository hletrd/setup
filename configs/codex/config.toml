model = "gpt-5.3-codex"
model_reasoning_effort = "xhigh"
approval_policy = "never"
sandbox_mode = "danger-full-access"

project_root_markers = [
  ".git",
  ".hg",
  ".sl",
  ".codex",
  "package.json",
  "pnpm-workspace.yaml",
  "turbo.json",
  "nx.json",
  "pyproject.toml",
  "poetry.lock",
  "requirements.txt",
  "Pipfile",
  "go.mod",
  "Cargo.toml",
  "pom.xml",
  "build.gradle",
]

[mcp_servers.filesystem]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem", "$HOME"]
startup_timeout_sec = 20
tool_timeout_sec = 120

[mcp_servers.git]
command = "uvx"
args = ["mcp-server-git"]
startup_timeout_sec = 20
tool_timeout_sec = 120

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp@latest"]
startup_timeout_sec = 20
tool_timeout_sec = 120
env_vars = ["CONTEXT7_API_KEY"]

[mcp_servers.context-mode]
command = "npx"
args = ["-y", "context-mode"]
startup_timeout_sec = 20
tool_timeout_sec = 120

[mcp_servers.playwright]
command = "npx"
args = ["-y", "@playwright/mcp@latest"]
startup_timeout_sec = 30
tool_timeout_sec = 180

[mcp_servers.playwright.env]
PLAYWRIGHT_BROWSERS_PATH = "0"

[mcp_servers.agentic-tools]
command = "npx"
args = ["-y", "@pimzino/agentic-tools-mcp"]
startup_timeout_sec = 20
tool_timeout_sec = 120

[mcp_servers.graphiti]
command = "npx"
args = ["-y", "@zhangzichao2008/mcp-graphiti"]
startup_timeout_sec = 20
tool_timeout_sec = 120
env_vars = [
  "NEO4J_URI",
  "NEO4J_USER",
  "NEO4J_PASSWORD",
  "NEO4J_DATABASE",
  "EMBEDDING_API_KEY",
  "EMBEDDING_API_URL",
  "EMBEDDING_MODEL",
]

[mcp_servers.memora]
command = "memora-server"
args = []
startup_timeout_sec = 20
tool_timeout_sec = 120

[mcp_servers.memora.env]
MEMORA_DB_PATH = "$HOME/.local/share/memora/memories.db"
MEMORA_ALLOW_ANY_TAG = "1"
MEMORA_GRAPH_PORT = "8765"

