# oh-my-codex top-level settings (must be before any [table])
notify = ["node", "__HOME__/.local/share/fnm/node-versions/v24.13.0/installation/lib/node_modules/oh-my-codex/scripts/notify-hook.js"]
model_reasoning_effort = "xhigh"
developer_instructions = "You have oh-my-codex installed. Use /prompts:architect, /prompts:executor, /prompts:planner for specialized agent roles. Workflow skills via $name: $ralph, $autopilot, $plan. AGENTS.md is your orchestration brain."

model = "gpt-5.3-codex"

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp@latest"]
startup_timeout_sec = 20
tool_timeout_sec = 120
env_vars = ["CONTEXT7_API_KEY"]

[mcp_servers.context-mode]
command = "npx"
args = ["-y", "context-mode"]
startup_timeout_sec = 20
tool_timeout_sec = 120

# ── Agent Profiles ──────────────────────────────────────────────

[profiles.architect]
model = "gpt-5.3-codex"
model_reasoning_effort = "xhigh"

[profiles.code-reviewer]
model = "gpt-5.3-codex"
model_reasoning_effort = "xhigh"

